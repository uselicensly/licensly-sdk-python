name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Checkout parent api (for contract pack)
        uses: actions/checkout@v4
        with:
          repository: uselicensly/licensly
          sparse-checkout: |
            api
            scripts
          path: _licensly
          token: ${{ secrets.LICENSLY_SUBMODULES_TOKEN }}

      - name: Fetch and verify contract
        run: |
          chmod +x scripts/fetch-contract.sh
          LICENSLY_CONTRACT_API_ROOT="$PWD/_licensly" ./scripts/fetch-contract.sh

      - name: Run tests
        run: pytest -v --tb=short
