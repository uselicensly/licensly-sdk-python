name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Check contract lock shape
        run: |
          python3 - <<'PY'
          import json
          lock = json.load(open("contract.lock.json"))
          assert lock.get("contract_version"), "missing contract_version"
          assert lock.get("bundle_sha256"), "missing bundle_sha256"
          print("lock ok", lock["contract_version"])
          PY

      - name: Run tests
        run: pytest -v --tb=short
